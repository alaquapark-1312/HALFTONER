<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALFTONER</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #090907;
  --s1:    #111110;
  --s2:    #1a1916;
  --s3:    #262420;
  --s4:    #322e28;
  --acc:   #e8c84a;
  --acc2:  #d43020;
  --txt:   #ccc7b8;
  --muted: #5a5650;
  --white: #ede9df;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Azeret Mono',monospace;
  background:var(--bg);color:var(--txt);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  font-size:12px;
}

/* ── TOPBAR ───────────────────────────────────── */
#topbar{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;height:46px;
  border-bottom:1px solid var(--s3);flex-shrink:0;
  background:var(--s1);
}
.logo{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:20px;letter-spacing:.22em;color:var(--acc);
  margin-right:4px;
}
.logo em{color:var(--acc2);font-style:normal;}
.topbar-sep{flex:1;}
.tb-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;
  background:var(--s2);border:1px solid var(--s3);border-radius:2px;
  color:var(--txt);cursor:pointer;
  font-family:'Azeret Mono',monospace;font-size:10px;letter-spacing:.07em;
  transition:border-color .12s,color .12s;white-space:nowrap;
}
.tb-btn:hover{border-color:var(--acc);color:var(--acc);}
.tb-btn.active{border-color:var(--acc);color:var(--acc);}
.tb-btn svg{flex-shrink:0;}

/* ── LANG SWITCHER ────────────────────────────── */
.lang-switcher{
  display:flex;
  border:1px solid var(--s3);border-radius:2px;overflow:hidden;
}
.lang-btn{
  padding:5px 8px;
  background:var(--s2);border:none;border-right:1px solid var(--s3);
  color:var(--muted);cursor:pointer;
  font-family:'Azeret Mono',monospace;font-size:9px;letter-spacing:.08em;
  transition:background .12s,color .12s;
}
.lang-btn:last-child{border-right:none;}
.lang-btn:hover{color:var(--txt);}
.lang-btn.active{background:var(--s3);color:var(--acc);}

.exp-wrap{position:relative;}
.exp-btn{
  padding:5px 12px;background:var(--acc);border:none;border-radius:2px;
  color:var(--bg);cursor:pointer;
  font-family:'Azeret Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.07em;
  white-space:nowrap;
}
.exp-btn:hover{background:#f0d45e;}
.exp-menu{
  position:absolute;top:calc(100% + 4px);right:0;
  background:var(--s2);border:1px solid var(--s3);border-radius:2px;
  overflow:hidden;display:none;z-index:200;min-width:190px;
}
.exp-menu.open{display:block;}
.exp-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;cursor:pointer;font-size:10px;letter-spacing:.06em;
  color:var(--txt);
}
.exp-item:hover{background:var(--s3);color:var(--acc);}
.exp-tag{font-size:9px;color:var(--muted);}

/* ── WORKSPACE ────────────────────────────────── */
#workspace{display:flex;flex:1;overflow:hidden;}

/* ── CANVAS AREA ──────────────────────────────── */
#canvas-area{
  flex:1;position:relative;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#canvas-area.drag-over{outline:2px solid var(--acc);outline-offset:-3px;}
#glCanvas{
  max-width:100%;max-height:100%;
  display:block;image-rendering:pixelated;
}
#drop-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;pointer-events:none;
  transition:opacity .2s;
}
#drop-overlay.hidden{opacity:0;}
.drop-icon{
  width:72px;height:72px;
  border:1px dashed var(--s4);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:var(--muted);
}
.drop-label{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:22px;letter-spacing:.12em;color:var(--muted);
}
.drop-sub{font-size:10px;color:var(--muted);letter-spacing:.06em;text-align:center;line-height:1.6;}
.drop-click{
  margin-top:4px;padding:6px 16px;
  background:var(--s2);border:1px solid var(--s3);border-radius:2px;
  color:var(--muted);font-size:10px;letter-spacing:.07em;cursor:pointer;
  pointer-events:all;transition:border-color .12s,color .12s;
}
.drop-click:hover{border-color:var(--acc);color:var(--acc);}
#split-line{
  position:absolute;top:0;width:1px;height:100%;
  background:var(--acc);pointer-events:none;display:none;z-index:5;
}

/* ── SIDEBAR ──────────────────────────────────── */
#sidebar{
  width:272px;flex-shrink:0;
  border-left:1px solid var(--s3);
  display:flex;flex-direction:column;
  background:var(--s1);overflow:hidden;
}
#effect-tabs{
  display:flex;border-bottom:1px solid var(--s3);flex-shrink:0;
  background:var(--bg);
}
.eff-tab{
  flex:1;padding:9px 2px;text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:.06em;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;
  transition:color .12s,border-color .12s;
}
.eff-tab:hover{color:var(--txt);}
.eff-tab.active{color:var(--acc);border-bottom-color:var(--acc);}

#ctrl-scroll{
  flex:1;overflow-y:auto;padding:14px 14px 20px;
  display:flex;flex-direction:column;gap:18px;
}
#ctrl-scroll::-webkit-scrollbar{width:3px;}
#ctrl-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}

.ctrl-section{display:flex;flex-direction:column;gap:10px;}
.ctrl-section-hd{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:10px;letter-spacing:.14em;color:var(--muted);
  text-transform:uppercase;border-bottom:1px solid var(--s3);
  padding-bottom:5px;margin-bottom:2px;
}

.ctrl-row{display:flex;flex-direction:column;gap:4px;}
.ctrl-lrow{display:flex;justify-content:space-between;align-items:center;}
.ctrl-label{font-size:9px;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;}
.ctrl-val{font-size:9px;color:var(--acc);font-variant-numeric:tabular-nums;}

input[type="range"]{
  -webkit-appearance:none;width:100%;height:2px;
  background:var(--s3);border-radius:1px;outline:none;cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  background:var(--acc);border-radius:50%;cursor:pointer;
  transition:transform .1s;
}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.4);}

.ctrl-toggle-row{
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
}
.toggle-track{
  width:30px;height:15px;background:var(--s3);border-radius:8px;
  position:relative;transition:background .15s;flex-shrink:0;
}
.toggle-track.on{background:var(--acc);}
.toggle-thumb{
  position:absolute;width:11px;height:11px;
  background:var(--bg);border-radius:50%;top:2px;left:2px;
  transition:left .15s;
}
.toggle-track.on .toggle-thumb{left:17px;}

.shape-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.shape-btn{
  padding:3px 9px;
  background:var(--s2);border:1px solid var(--s3);border-radius:2px;
  color:var(--txt);cursor:pointer;
  font-family:'Azeret Mono',monospace;font-size:9px;letter-spacing:.04em;
  transition:all .1s;
}
.shape-btn:hover{border-color:var(--txt);}
.shape-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(232,200,74,.07);}

.color-row{display:flex;align-items:center;gap:8px;}
.color-swatch{
  width:22px;height:22px;border-radius:2px;
  border:1px solid var(--s3);cursor:pointer;
  position:relative;overflow:hidden;flex-shrink:0;
}
.color-swatch input[type="color"]{
  position:absolute;inset:-4px;width:200%;height:200%;
  border:none;cursor:pointer;opacity:0;
}

/* ── INFO BAR ─────────────────────────────────── */
#info-bar{
  border-top:1px solid var(--s3);padding:7px 14px;
  font-size:9px;color:var(--muted);letter-spacing:.05em;
  display:flex;justify-content:space-between;flex-shrink:0;
}

.spinner{
  position:fixed;bottom:16px;right:16px;
  font-size:9px;color:var(--muted);letter-spacing:.1em;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.spinner.on{opacity:1;}
</style>
</head>
<body>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<div id="topbar">
  <div class="logo">HALF<em>T</em>ONER</div>
  <div class="topbar-sep"></div>

  <!-- Language switcher -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="eu">EU</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <button class="tb-btn" id="uploadBtn">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M5 1L8 4H6v4H4V4H2L5 1z"/><rect x="1" y="8" width="8" height="1.2"/></svg>
    <span data-t="upload"></span>
  </button>
  <button class="tb-btn" id="splitBtn">◧ <span data-t="split"></span></button>
  <div class="exp-wrap">
    <button class="exp-btn" id="expBtn">↓ <span data-t="export"></span> ▾</button>
    <div class="exp-menu" id="expMenu">
      <div class="exp-item" data-act="png">PNG <span class="exp-tag" data-t="exp_png_tag"></span></div>
      <div class="exp-item" data-act="svg">SVG <span class="exp-tag" data-t="exp_svg_tag"></span></div>
      <div class="exp-item" data-act="cmyk">CMYK SVG <span class="exp-tag" data-t="exp_cmyk_tag"></span></div>
    </div>
  </div>
</div>

<div id="workspace">
  <div id="canvas-area">
    <canvas id="glCanvas"></canvas>
    <div id="drop-overlay">
      <div class="drop-icon">🖼</div>
      <div class="drop-label" data-t="drop_title"></div>
      <div class="drop-sub" data-t="drop_sub"></div>
      <div class="drop-click" id="dropClick" data-t="drop_btn"></div>
    </div>
    <div id="split-line"></div>
  </div>

  <div id="sidebar">
    <div id="effect-tabs">
      <div class="eff-tab active" data-eff="dots">DOTS</div>
      <div class="eff-tab" data-eff="cmyk">CMYK</div>
      <div class="eff-tab" data-eff="linear" data-t-tab="tab_linear"></div>
      <div class="eff-tab" data-eff="shapes" data-t-tab="tab_shapes"></div>
      <div class="eff-tab" data-eff="riso">RISO</div>
    </div>
    <div id="ctrl-scroll"></div>
    <div id="info-bar">
      <span id="info-size">— × —</span>
      <span id="info-eff"></span>
    </div>
  </div>
</div>

<div class="spinner" id="spinner"><span data-t="processing"></span></div>

<script>
// ═══════════════════════════════════════════════════════════
//  i18n
// ═══════════════════════════════════════════════════════════
const LANGS = {
  eu: {
    upload:'IRUDIA', split:'ZATIKETA', export:'EXPORTATU', processing:'PROZESATZEN…',
    exp_png_tag:'canvas bereizmena', exp_svg_tag:'bektorial param.', exp_cmyk_tag:'4 banaketa',
    drop_title:'ARRASTATU IRUDI BAT', drop_sub:'JPG · PNG · WEBP · edozein bereizmen',
    drop_btn:'FITXATEGIA HAUTATU',
    tab_linear:'LERROA', tab_shapes:'FORMA',
    // Effects
    eff_dots:'DOTS · KLASIKOA', eff_cmyk:'CMYK · BANAKETA',
    eff_linear:'LINEALA · CROSSHATCH', eff_shapes:'FORMAK · SDF', eff_riso:'RISOGRAPH · GERUZAK',
    // Control labels
    cell_size:'ZELDA TAMAINA', cell_size_s:'TAMAINA', angle:'ANGELUA °', angle1:'1. ANGELUA °',
    angle2:'2. ANGELUA °', gamma:'GAMMA', invert:'ALDERANTZIKATU', ink:'TINTA', paper:'PAPERA',
    freq:'MAIZTASUNA', crosshatch:'CROSSHATCH', dot_gain:'DOT GAIN', colors:'KOLOREAK',
    misreg:'DESPLAZ. px', grain:'GRAINA', col1:'KOLOREA 1', col2:'KOLOREA 2', col3:'KOLOREA 3',
    // Shapes
    sh_hex:'⬡ HEX', sh_cross:'✛ GURUTZE', sh_diamond:'◆ DIAMANTE', sh_star:'★ IZAR',
  },
  es: {
    upload:'IMAGEN', split:'SPLIT', export:'EXPORTAR', processing:'PROCESANDO…',
    exp_png_tag:'resolución canvas', exp_svg_tag:'vectorial param.', exp_cmyk_tag:'4 separaciones',
    drop_title:'ARRASTRA UNA IMAGEN', drop_sub:'JPG · PNG · WEBP · cualquier resolución',
    drop_btn:'SELECCIONAR ARCHIVO',
    tab_linear:'LÍNEA', tab_shapes:'FORMA',
    eff_dots:'DOTS · CLÁSICO', eff_cmyk:'CMYK · SEPARACIÓN',
    eff_linear:'LINEAL · CROSSHATCH', eff_shapes:'FORMAS · SDF', eff_riso:'RISOGRAPH · CAPAS',
    cell_size:'TAMAÑO CELDA', cell_size_s:'TAMAÑO', angle:'ÁNGULO °', angle1:'ÁNGULO 1 °',
    angle2:'ÁNGULO 2 °', gamma:'GAMMA', invert:'INVERTIR', ink:'TINTA', paper:'PAPEL',
    freq:'FRECUENCIA', crosshatch:'CROSSHATCH', dot_gain:'DOT GAIN', colors:'COLORES',
    misreg:'DESFASE px', grain:'GRANO', col1:'COLOR 1', col2:'COLOR 2', col3:'COLOR 3',
    sh_hex:'⬡ HEX', sh_cross:'✛ CRUZ', sh_diamond:'◆ DIAMANTE', sh_star:'★ ESTRELLA',
  },
  en: {
    upload:'IMAGE', split:'SPLIT', export:'EXPORT', processing:'PROCESSING…',
    exp_png_tag:'canvas resolution', exp_svg_tag:'parametric vector', exp_cmyk_tag:'4 separations',
    drop_title:'DROP AN IMAGE HERE', drop_sub:'JPG · PNG · WEBP · any resolution',
    drop_btn:'SELECT FILE',
    tab_linear:'LINE', tab_shapes:'SHAPE',
    eff_dots:'DOTS · CLASSIC', eff_cmyk:'CMYK · SEPARATION',
    eff_linear:'LINEAR · CROSSHATCH', eff_shapes:'SHAPES · SDF', eff_riso:'RISOGRAPH · LAYERS',
    cell_size:'CELL SIZE', cell_size_s:'SIZE', angle:'ANGLE °', angle1:'ANGLE 1 °',
    angle2:'ANGLE 2 °', gamma:'GAMMA', invert:'INVERT', ink:'INK', paper:'PAPER',
    freq:'FREQUENCY', crosshatch:'CROSSHATCH', dot_gain:'DOT GAIN', colors:'COLORS',
    misreg:'MISREG px', grain:'GRAIN', col1:'COLOR 1', col2:'COLOR 2', col3:'COLOR 3',
    sh_hex:'⬡ HEX', sh_cross:'✛ CROSS', sh_diamond:'◆ DIAMOND', sh_star:'★ STAR',
  }
};

let currentLang = 'eu';

function t(key){ return LANGS[currentLang][key] || key; }

function applyLang(){
  document.documentElement.lang = currentLang;
  // Static data-t elements
  document.querySelectorAll('[data-t]').forEach(el=>{
    const key = el.dataset.t;
    el.textContent = t(key);
  });
  // Effect tab labels (dots/cmyk/riso are constant, linear and shapes vary)
  document.querySelectorAll('[data-t-tab]').forEach(el=>{
    el.textContent = t(el.dataset.tTab);
  });
  // Lang switcher active
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });
  // Rebuild controls (labels change)
  buildControls(state.effect);
  // Update info eff label
  document.getElementById('info-eff').textContent = t('eff_'+state.effect);
}

// ═══════════════════════════════════════════════════════════
//  SHADERS
// ═══════════════════════════════════════════════════════════

const VS = `
attribute vec2 a_pos;
void main(){gl_Position=vec4(a_pos,0.,1.);}
`;

const FS_DOTS = `
precision highp float;
uniform sampler2D u_img;
uniform vec2 u_res;
uniform float u_cell,u_angle,u_gamma,u_inv,u_splitX;
uniform vec3 u_ink,u_paper;
float luma(vec3 c){return dot(c,vec3(.299,.587,.114));}
void main(){
  vec2 fc=gl_FragCoord.xy;
  vec2 uv=vec2(fc.x,u_res.y-fc.y)/u_res;
  if(fc.x<u_splitX){gl_FragColor=vec4(texture2D(u_img,uv).rgb,1.);return;}
  float ca=cos(u_angle),sa=sin(u_angle);
  vec2 rfc=vec2(ca*fc.x-sa*fc.y,sa*fc.x+ca*fc.y);
  vec2 ccr=(floor(rfc/u_cell)+.5)*u_cell;
  vec2 ccw=vec2(ca*ccr.x+sa*ccr.y,-sa*ccr.x+ca*ccr.y);
  vec2 suv=clamp(ccw/u_res,0.,1.);suv.y=1.-suv.y;
  float l=luma(texture2D(u_img,suv).rgb);
  if(u_inv>.5)l=1.-l;
  l=pow(clamp(l,.001,1.),u_gamma);
  float r=l*u_cell*.5*.96;
  float m=1.-smoothstep(r-.8,r+.8,length(rfc-ccr));
  gl_FragColor=vec4(mix(u_paper,u_ink,m),1.);
}`;

const FS_CMYK = `
precision highp float;
uniform sampler2D u_img;
uniform vec2 u_res;
uniform float u_cell,u_dg,u_splitX;
const float PI=3.14159265359;
void getCMYK(vec3 rgb,out float c,out float m,out float y,out float k){
  k=1.-max(max(rgb.r,rgb.g),rgb.b);
  float d=max(1.-k,.001);
  c=clamp((1.-rgb.r-k)/d,0.,1.);
  m=clamp((1.-rgb.g-k)/d,0.,1.);
  y=clamp((1.-rgb.b-k)/d,0.,1.);
  k=clamp(k,0.,1.);
}
vec2 cellSample(vec2 fc,float angle,float sz){
  float ca=cos(angle),sa=sin(angle);
  vec2 rfc=vec2(ca*fc.x-sa*fc.y,sa*fc.x+ca*fc.y);
  vec2 ccr=(floor(rfc/sz)+.5)*sz;
  vec2 ccw=vec2(ca*ccr.x+sa*ccr.y,-sa*ccr.x+ca*ccr.y);
  vec2 suv=clamp(ccw/u_res,0.,1.);suv.y=1.-suv.y;
  return suv;
}
float dotMask(vec2 fc,float angle,float sz,float val){
  float ca=cos(angle),sa=sin(angle);
  vec2 rfc=vec2(ca*fc.x-sa*fc.y,sa*fc.x+ca*fc.y);
  vec2 ccr=(floor(rfc/sz)+.5)*sz;
  float r=clamp(val,0.,1.)*sz*.5*.96;
  return 1.-smoothstep(r-.8,r+.8,length(rfc-ccr));
}
void main(){
  vec2 fc=gl_FragCoord.xy;
  vec2 uv=vec2(fc.x,u_res.y-fc.y)/u_res;
  if(fc.x<u_splitX){gl_FragColor=texture2D(u_img,uv);return;}
  float aC=105.*PI/180.,aM=75.*PI/180.,aY=90.*PI/180.,aK=45.*PI/180.;
  float cC,mC,yC,kC;
  getCMYK(texture2D(u_img,cellSample(fc,aC,u_cell)).rgb,cC,mC,yC,kC);
  cC+=u_dg*cC*(1.-cC);
  float cM,mM,yM,kM;
  getCMYK(texture2D(u_img,cellSample(fc,aM,u_cell)).rgb,cM,mM,yM,kM);
  mM+=u_dg*mM*(1.-mM);
  float cY,mY,yY,kY;
  getCMYK(texture2D(u_img,cellSample(fc,aY,u_cell)).rgb,cY,mY,yY,kY);
  yY+=u_dg*yY*(1.-yY);
  float cK,mK,yK,kK;
  getCMYK(texture2D(u_img,cellSample(fc,aK,u_cell)).rgb,cK,mK,yK,kK);
  kK+=u_dg*kK*(1.-kK);
  float dC=dotMask(fc,aC,u_cell,cC);
  float dM=dotMask(fc,aM,u_cell,mM);
  float dY=dotMask(fc,aY,u_cell,yY);
  float dK=dotMask(fc,aK,u_cell,kK);
  vec3 res=vec3(1.);
  res=mix(res,res*vec3(0.,1.,1.),dC);
  res=mix(res,res*vec3(1.,0.,1.),dM);
  res=mix(res,res*vec3(1.,1.,0.),dY);
  res=mix(res,vec3(0.),dK);
  gl_FragColor=vec4(res,1.);
}`;

const FS_LINEAR = `
precision highp float;
uniform sampler2D u_img;
uniform vec2 u_res;
uniform float u_cell,u_angle,u_angle2,u_cross,u_splitX;
uniform vec3 u_ink,u_paper;
float luma(vec3 c){return dot(c,vec3(.299,.587,.114));}
float linePass(vec2 fc,float angle,float sz){
  float ca=cos(angle),sa=sin(angle);
  vec2 rfc=vec2(ca*fc.x-sa*fc.y,sa*fc.x+ca*fc.y);
  float rowCy=(floor(rfc.y/sz)+.5)*sz;
  vec2 sr=vec2(rfc.x,rowCy);
  vec2 sw=vec2(ca*sr.x+sa*sr.y,-sa*sr.x+ca*sr.y);
  vec2 suv=clamp(sw/u_res,0.,1.);suv.y=1.-suv.y;
  float l=luma(texture2D(u_img,suv).rgb);
  float hw=l*sz*.5*.96;
  return 1.-smoothstep(hw-.8,hw+.8,abs(rfc.y-rowCy));
}
void main(){
  vec2 fc=gl_FragCoord.xy;
  vec2 uv=vec2(fc.x,u_res.y-fc.y)/u_res;
  if(fc.x<u_splitX){gl_FragColor=vec4(texture2D(u_img,uv).rgb,1.);return;}
  float m=linePass(fc,u_angle,u_cell);
  if(u_cross>.5)m=max(m,linePass(fc,u_angle2,u_cell));
  gl_FragColor=vec4(mix(u_paper,u_ink,m),1.);
}`;

const FS_SHAPES = `
precision highp float;
uniform sampler2D u_img;
uniform vec2 u_res;
uniform float u_cell,u_angle,u_shape,u_splitX;
uniform vec3 u_ink,u_paper;
float luma(vec3 c){return dot(c,vec3(.299,.587,.114));}
float sdfHex(vec2 p){p=abs(p);return max(dot(p,normalize(vec2(1.,1.73205))),p.x)-1.;}
float sdfCross(vec2 p){p=abs(p);float w=.38;return min(max(p.x-1.,p.y-w),max(p.y-1.,p.x-w));}
float sdfDia(vec2 p){p=abs(p);return(p.x+p.y)-1.;}
float sdfStar(vec2 p){
  float an=.6283185,bn=mod(atan(p.y,p.x),2.*an)-an;
  p=length(p)*vec2(cos(bn),abs(sin(bn)));
  p-=vec2(.951,.309);
  p.y+=clamp(-p.y,0.,.226);
  return length(p)*sign(p.x);
}
void main(){
  vec2 fc=gl_FragCoord.xy;
  vec2 uv=vec2(fc.x,u_res.y-fc.y)/u_res;
  if(fc.x<u_splitX){gl_FragColor=vec4(texture2D(u_img,uv).rgb,1.);return;}
  float ca=cos(u_angle),sa=sin(u_angle);
  vec2 rfc=vec2(ca*fc.x-sa*fc.y,sa*fc.x+ca*fc.y);
  vec2 ccr=(floor(rfc/u_cell)+.5)*u_cell;
  vec2 ccw=vec2(ca*ccr.x+sa*ccr.y,-sa*ccr.x+ca*ccr.y);
  vec2 suv=clamp(ccw/u_res,0.,1.);suv.y=1.-suv.y;
  float l=luma(texture2D(u_img,suv).rgb);
  float sc=max(l*u_cell*.5*.96,.01);
  vec2 ln=(rfc-ccr)/sc;
  float aa=1.5/sc;
  float sdf;
  if(u_shape<.5)      sdf=sdfHex(ln);
  else if(u_shape<1.5)sdf=sdfCross(ln);
  else if(u_shape<2.5)sdf=sdfDia(ln);
  else                sdf=sdfStar(ln);
  float m=1.-smoothstep(-aa,aa,sdf);
  gl_FragColor=vec4(mix(u_paper,u_ink,m),1.);
}`;

const FS_RISO = `
precision highp float;
uniform sampler2D u_img;
uniform vec2 u_res;
uniform float u_cell,u_nc,u_mr,u_grain,u_splitX;
uniform vec3 u_c1,u_c2,u_c3;
const float PI=3.14159265;
float luma(vec3 c){return dot(c,vec3(.299,.587,.114));}
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float hdot(vec2 fc,float angle,float sz,float inv){
  float ca=cos(angle),sa=sin(angle);
  vec2 rfc=vec2(ca*fc.x-sa*fc.y,sa*fc.x+ca*fc.y);
  vec2 ccr=(floor(rfc/sz)+.5)*sz;
  vec2 ccw=vec2(ca*ccr.x+sa*ccr.y,-sa*ccr.x+ca*ccr.y);
  vec2 suv=clamp(ccw/u_res,0.,1.);suv.y=1.-suv.y;
  float l=luma(texture2D(u_img,suv).rgb);
  if(inv>.5)l=1.-l;
  float r=l*sz*.5*.96;
  return 1.-smoothstep(r-.8,r+.8,length(rfc-ccr));
}
void main(){
  vec2 fc=gl_FragCoord.xy;
  vec2 uv=vec2(fc.x,u_res.y-fc.y)/u_res;
  if(fc.x<u_splitX){gl_FragColor=vec4(texture2D(u_img,uv).rgb,1.);return;}
  float d1=hdot(fc+vec2(u_mr*.7,u_mr*.4),45.*PI/180.,u_cell,0.);
  float d2=hdot(fc-vec2(u_mr*.5,u_mr*.6),75.*PI/180.,u_cell,1.);
  vec3 res=vec3(1.);
  res*=mix(vec3(1.),u_c1,d1);
  res*=mix(vec3(1.),u_c2,d2);
  if(u_nc>2.5){
    float d3=hdot(fc+vec2(-u_mr*.3,u_mr*.8),15.*PI/180.,u_cell*.85,0.);
    res*=mix(vec3(1.),u_c3,d3*.75);
  }
  float g=(hash(floor(fc))-0.5)*u_grain*.18;
  res=clamp(res+g,0.,1.);
  gl_FragColor=vec4(res,1.);
}`;

// ═══════════════════════════════════════════════════════════
//  WEBGL SETUP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl',{preserveDrawingBuffer:true,antialias:false});

function compileShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));gl.deleteShader(s);return null;}
  return s;
}
function makeProgram(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,compileShader(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,compileShader(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));return null;}
  return p;
}

const progs = {
  dots:   makeProgram(VS,FS_DOTS),
  cmyk:   makeProgram(VS,FS_CMYK),
  linear: makeProgram(VS,FS_LINEAR),
  shapes: makeProgram(VS,FS_SHAPES),
  riso:   makeProgram(VS,FS_RISO),
};

const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

function u(p,n){return gl.getUniformLocation(p,n);}
function hexRGB(h){
  const n=parseInt(h.slice(1),16);
  return[(n>>16&255)/255,(n>>8&255)/255,(n&255)/255];
}

function render(){
  if(!state.imageLoaded) return;
  const prog = progs[state.effect];
  const p    = state.params[state.effect];
  const W=canvas.width, H=canvas.height;
  gl.viewport(0,0,W,H);
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  const aPos=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.uniform1i(u(prog,'u_img'),0);
  gl.uniform2f(u(prog,'u_res'),W,H);
  gl.uniform1f(u(prog,'u_splitX'),state.splitActive?state.splitX:-1);
  const eff=state.effect;
  if(eff==='dots'){
    gl.uniform1f(u(prog,'u_cell'),p.cellSize);
    gl.uniform1f(u(prog,'u_angle'),p.angle*Math.PI/180);
    gl.uniform1f(u(prog,'u_gamma'),p.gamma);
    gl.uniform1f(u(prog,'u_inv'),p.invert?1:0);
    gl.uniform3fv(u(prog,'u_ink'),hexRGB(p.inkColor));
    gl.uniform3fv(u(prog,'u_paper'),hexRGB(p.paperColor));
  } else if(eff==='cmyk'){
    gl.uniform1f(u(prog,'u_cell'),p.cellSize);
    gl.uniform1f(u(prog,'u_dg'),p.dotGain);
  } else if(eff==='linear'){
    gl.uniform1f(u(prog,'u_cell'),p.cellSize);
    gl.uniform1f(u(prog,'u_angle'),p.angle*Math.PI/180);
    gl.uniform1f(u(prog,'u_angle2'),p.angle2*Math.PI/180);
    gl.uniform1f(u(prog,'u_cross'),p.crosshatch?1:0);
    gl.uniform3fv(u(prog,'u_ink'),hexRGB(p.inkColor));
    gl.uniform3fv(u(prog,'u_paper'),hexRGB(p.paperColor));
  } else if(eff==='shapes'){
    gl.uniform1f(u(prog,'u_cell'),p.cellSize);
    gl.uniform1f(u(prog,'u_angle'),p.angle*Math.PI/180);
    gl.uniform1f(u(prog,'u_shape'),['hex','cross','diamond','star'].indexOf(p.shape));
    gl.uniform3fv(u(prog,'u_ink'),hexRGB(p.inkColor));
    gl.uniform3fv(u(prog,'u_paper'),hexRGB(p.paperColor));
  } else if(eff==='riso'){
    gl.uniform1f(u(prog,'u_cell'),p.cellSize);
    gl.uniform1f(u(prog,'u_nc'),p.numColors);
    gl.uniform1f(u(prog,'u_mr'),p.misreg);
    gl.uniform1f(u(prog,'u_grain'),p.grain);
    gl.uniform3fv(u(prog,'u_c1'),hexRGB(p.color1));
    gl.uniform3fv(u(prog,'u_c2'),hexRGB(p.color2));
    gl.uniform3fv(u(prog,'u_c3'),hexRGB(p.color3));
  }
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

function loadImage(img){
  const MAX=2048;
  let w=img.naturalWidth,h=img.naturalHeight;
  if(w>MAX||h>MAX){const sc=MAX/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc);}
  canvas.width=w;canvas.height=h;
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
  state.imageLoaded=true;state.imgEl=img;
  document.getElementById('drop-overlay').classList.add('hidden');
  document.getElementById('info-size').textContent=`${w} × ${h} px`;
  render();
}

function buildControls(eff){
  const scroll=document.getElementById('ctrl-scroll');
  scroll.innerHTML='';
  const p=state.params[eff];
  const EFF=getEFF();
  const def=EFF[eff];

  const sec=document.createElement('div');
  sec.className='ctrl-section';
  const hd=document.createElement('div');
  hd.className='ctrl-section-hd';
  hd.textContent=t(def.labelKey);
  sec.appendChild(hd);

  for(const c of def.ctrls){
    if(eff==='riso'&&c.id==='color3'&&p.numColors<=2) continue;
    const row=document.createElement('div');row.className='ctrl-row';

    if(c.t==='slider'){
      const lr=document.createElement('div');lr.className='ctrl-lrow';
      const lbl=document.createElement('span');lbl.className='ctrl-label';lbl.textContent=t(c.lk);
      const val=document.createElement('span');val.className='ctrl-val';val.id='v_'+c.id;
      const v=p[c.id]??c.def;
      val.textContent=v.toFixed(c.step<1?2:0);
      lr.appendChild(lbl);lr.appendChild(val);
      const inp=document.createElement('input');
      inp.type='range';inp.min=c.min;inp.max=c.max;inp.step=c.step;inp.value=v;
      inp.addEventListener('input',()=>{
        const nv=parseFloat(inp.value);
        state.params[eff][c.id]=nv;
        val.textContent=nv.toFixed(c.step<1?2:0);
        render();
        if(eff==='riso'&&c.id==='numColors') buildControls('riso');
      });
      row.appendChild(lr);row.appendChild(inp);

    } else if(c.t==='toggle'){
      const tr=document.createElement('div');tr.className='ctrl-toggle-row';
      const lbl=document.createElement('span');lbl.className='ctrl-label';lbl.textContent=t(c.lk);
      const track=document.createElement('div');
      track.className='toggle-track'+(p[c.id]?' on':'');
      const thumb=document.createElement('div');thumb.className='toggle-thumb';
      track.appendChild(thumb);tr.appendChild(lbl);tr.appendChild(track);
      tr.addEventListener('click',()=>{
        state.params[eff][c.id]=!state.params[eff][c.id];
        track.classList.toggle('on',state.params[eff][c.id]);
        render();
      });
      row.appendChild(tr);

    } else if(c.t==='color'){
      const cr=document.createElement('div');cr.className='color-row';
      const sw=document.createElement('div');sw.className='color-swatch';
      sw.style.background=p[c.id]??c.def;
      const ci=document.createElement('input');ci.type='color';ci.value=p[c.id]??c.def;
      ci.addEventListener('input',()=>{
        state.params[eff][c.id]=ci.value;sw.style.background=ci.value;render();
      });
      sw.appendChild(ci);
      const lbl=document.createElement('span');lbl.className='ctrl-label';lbl.textContent=t(c.lk);
      cr.appendChild(sw);cr.appendChild(lbl);row.appendChild(cr);

    } else if(c.t==='shapes'){
      const sr=document.createElement('div');sr.className='shape-row';
      for(const opt of c.opts){
        const btn=document.createElement('div');
        btn.className='shape-btn'+(p[c.id]===opt?' active':'');
        btn.textContent=t('sh_'+opt);
        btn.addEventListener('click',()=>{
          state.params[eff][c.id]=opt;
          sr.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');render();
        });
        sr.appendChild(btn);
      }
      row.appendChild(sr);
    }
    sec.appendChild(row);
  }
  scroll.appendChild(sec);
  document.getElementById('info-eff').textContent=t('eff_'+eff);
}

// ═══════════════════════════════════════════════════════════
//  SVG GENERATORS
// ═══════════════════════════════════════════════════════════
function getImgData(){
  const tmp=document.createElement('canvas');
  tmp.width=canvas.width;tmp.height=canvas.height;
  const ctx=tmp.getContext('2d');
  ctx.drawImage(state.imgEl,0,0,tmp.width,tmp.height);
  return ctx.getImageData(0,0,tmp.width,tmp.height);
}
function lumaAt(d,W,H,x,y){
  x=Math.max(0,Math.min(W-1,Math.round(x)));y=Math.max(0,Math.min(H-1,Math.round(y)));
  const i=(y*W+x)*4;return(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2])/255;
}
function rgbAt(d,W,H,x,y){
  x=Math.max(0,Math.min(W-1,Math.round(x)));y=Math.max(0,Math.min(H-1,Math.round(y)));
  const i=(y*W+x)*4;return[d[i]/255,d[i+1]/255,d[i+2]/255];
}
function mkRot(angDeg){
  const a=angDeg*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a);
  return{fwd:(x,y)=>[ca*x-sa*y,sa*x+ca*y],inv:(x,y)=>[ca*x+sa*y,-sa*x+ca*y]};
}
function gridBBox(W,H,rot,cs){
  const corners=[[0,H],[W,H],[W,0],[0,0]].map(([x,y])=>rot.fwd(x,y));
  return{
    c0x:Math.floor(Math.min(...corners.map(c=>c[0]))/cs)-1,
    c1x:Math.ceil (Math.max(...corners.map(c=>c[0]))/cs)+1,
    c0y:Math.floor(Math.min(...corners.map(c=>c[1]))/cs)-1,
    c1y:Math.ceil (Math.max(...corners.map(c=>c[1]))/cs)+1,
  };
}

function svgDots(data,W,H,p){
  const{cellSize:cs,angle,gamma,invert,inkColor,paperColor}=p;
  const rot=mkRot(angle);const bb=gridBBox(W,H,rot,cs);
  let circles='';
  for(let cy=bb.c0y;cy<=bb.c1y;cy++)for(let cx=bb.c0x;cx<=bb.c1x;cx++){
    const[rx,ry]=[(cx+.5)*cs,(cy+.5)*cs];
    const[wx,wy]=rot.inv(rx,ry);
    const imgX=wx,imgY=H-wy;
    if(imgX<0||imgX>=W||imgY<0||imgY>=H) continue;
    let l=lumaAt(data,W,H,imgX,imgY);
    if(invert) l=1-l;
    l=Math.pow(Math.max(l,.001),gamma);
    const r=l*cs*.5*.96;if(r<.2) continue;
    circles+=`<circle cx="${imgX.toFixed(2)}" cy="${imgY.toFixed(2)}" r="${r.toFixed(2)}"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs><clipPath id="c0"><rect width="${W}" height="${H}"/></clipPath></defs><rect width="${W}" height="${H}" fill="${paperColor}"/><g fill="${inkColor}" clip-path="url(#c0)">${circles}</g></svg>`;
}

function svgCMYK(data,W,H,p){
  const{cellSize:cs,dotGain:dg}=p;
  const angles=[105,75,90,45],names=['C','M','Y','K'];
  function getCMYK(r,g,b){
    const k=1-Math.max(r,g,b),d=Math.max(1-k,.001);
    return[Math.max(0,Math.min(1,(1-r-k)/d)),Math.max(0,Math.min(1,(1-g-k)/d)),Math.max(0,Math.min(1,(1-b-k)/d)),Math.max(0,Math.min(1,k))];
  }
  return angles.map((deg,ch)=>{
    const rot=mkRot(deg),bb=gridBBox(W,H,rot,cs);
    let circles='';
    for(let cy=bb.c0y;cy<=bb.c1y;cy++)for(let cx=bb.c0x;cx<=bb.c1x;cx++){
      const[rx,ry]=[(cx+.5)*cs,(cy+.5)*cs];
      const[wx,wy]=rot.inv(rx,ry);
      const imgX=wx,imgY=H-wy;
      if(imgX<0||imgX>=W||imgY<0||imgY>=H) continue;
      const[r,g,b]=rgbAt(data,W,H,imgX,imgY);
      let val=getCMYK(r,g,b)[ch];val+=dg*val*(1-val);val=Math.max(0,Math.min(1,val));
      const radius=val*cs*.5*.96;if(radius<.2) continue;
      circles+=`<circle cx="${imgX.toFixed(2)}" cy="${imgY.toFixed(2)}" r="${radius.toFixed(2)}"/>`;
    }
    return{name:names[ch],svg:`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="white"/><g fill="black">${circles}</g></svg>`};
  });
}

function svgLinear(data,W,H,p){
  const{cellSize:cs,angle,angle2,crosshatch,inkColor,paperColor}=p;
  function genStripes(deg){
    const rot=mkRot(deg),bb=gridBBox(W,H,rot,cs);
    let paths='';
    for(let rowI=bb.c0y;rowI<=bb.c1y;rowI++){
      const rowCY=(rowI+.5)*cs;
      const samples=[];
      for(let xi=bb.c0x-1;xi<=bb.c1x+1;xi++){
        const rx=(xi+.5)*cs;
        const[wx,wy]=rot.inv(rx,rowCY);
        samples.push({rx,hw:lumaAt(data,W,H,wx,H-wy)*cs*.5*.96});
      }
      if(samples.every(s=>s.hw<.2)) continue;
      const top=samples.map(s=>{const[wx,wy]=rot.inv(s.rx,rowCY-s.hw);return[wx,H-wy];});
      const bot=samples.slice().reverse().map(s=>{const[wx,wy]=rot.inv(s.rx,rowCY+s.hw);return[wx,H-wy];});
      const pts=[...top,...bot].map(([x,y])=>`${x.toFixed(2)},${y.toFixed(2)}`).join(' ');
      paths+=`<polygon points="${pts}"/>`;
    }
    return paths;
  }
  let content=genStripes(angle);if(crosshatch) content+=genStripes(angle2);
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs><clipPath id="c0"><rect width="${W}" height="${H}"/></clipPath></defs><rect width="${W}" height="${H}" fill="${paperColor}"/><g fill="${inkColor}" clip-path="url(#c0)">${content}</g></svg>`;
}

function svgShapes(data,W,H,p){
  const{cellSize:cs,angle,shape,inkColor,paperColor}=p;
  const rot=mkRot(angle),bb=gridBBox(W,H,rot,cs);
  function shapeEl(cx,cy,sc,shape){
    if(sc<.3) return'';
    const t=`translate(${cx.toFixed(2)},${cy.toFixed(2)}) rotate(${angle.toFixed(1)})`;
    if(shape==='hex'){
      const pts=Array.from({length:6},(_,i)=>{const a=(i*60-30)*Math.PI/180;return`${(sc*Math.cos(a)).toFixed(2)},${(sc*Math.sin(a)).toFixed(2)}`;}).join(' ');
      return`<polygon points="${pts}" transform="${t}"/>`;
    } else if(shape==='cross'){
      const w=sc*.38,h=sc;
      return`<path d="M${-h},${-w} L${-w},${-w} L${-w},${-h} L${w},${-h} L${w},${-w} L${h},${-w} L${h},${w} L${w},${w} L${w},${h} L${-w},${h} L${-w},${w} L${-h},${w} Z" transform="${t}"/>`;
    } else if(shape==='diamond'){
      return`<polygon points="0,${-sc} ${sc},0 0,${sc} ${-sc},0" transform="${t}"/>`;
    } else {
      const pts=Array.from({length:10},(_,i)=>{const a=(i*36-90)*Math.PI/180;const r=i%2===0?sc:sc*.4;return`${(r*Math.cos(a)).toFixed(2)},${(r*Math.sin(a)).toFixed(2)}`;}).join(' ');
      return`<polygon points="${pts}" transform="${t}"/>`;
    }
  }
  let els='';
  for(let cy=bb.c0y;cy<=bb.c1y;cy++)for(let cx=bb.c0x;cx<=bb.c1x;cx++){
    const[rx,ry]=[(cx+.5)*cs,(cy+.5)*cs];
    const[wx,wy]=rot.inv(rx,ry);
    const svgX=wx,svgY=H-wy;
    if(wx<0||wx>=W||svgY<0||svgY>=H) continue;
    const l=lumaAt(data,W,H,wx,svgY);
    els+=shapeEl(svgX,svgY,l*cs*.5*.96,shape);
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs><clipPath id="c0"><rect width="${W}" height="${H}"/></clipPath></defs><rect width="${W}" height="${H}" fill="${paperColor}"/><g fill="${inkColor}" clip-path="url(#c0)">${els}</g></svg>`;
}

function svgRiso(data,W,H,p){
  const{cellSize:cs,numColors,color1,color2,color3,misreg}=p;
  const angles=[45,75,15],colors=[color1,color2,color3];
  const invLayer=[false,true,false];
  const offsets=[[misreg*.7,misreg*.4],[-misreg*.5,misreg*.6],[misreg*.3,-misreg*.7]];
  const nL=Math.round(numColors);
  let layers='';
  for(let li=0;li<nL;li++){
    const rot=mkRot(angles[li]),bb=gridBBox(W,H,rot,cs);
    const[ox,oy]=offsets[li];
    let circles='';
    for(let cy=bb.c0y;cy<=bb.c1y;cy++)for(let cx=bb.c0x;cx<=bb.c1x;cx++){
      const[rx,ry]=[(cx+.5)*cs,(cy+.5)*cs];
      const[wx,wy]=rot.inv(rx,ry);
      const svgX=wx+ox,svgY=H-wy+oy,imgX=wx+ox,imgY=H-wy+oy;
      if(imgX<0||imgX>=W||imgY<0||imgY>=H) continue;
      let l=lumaAt(data,W,H,imgX,imgY);if(invLayer[li]) l=1-l;
      const r=l*cs*.5*.96;if(r<.2) continue;
      circles+=`<circle cx="${svgX.toFixed(2)}" cy="${svgY.toFixed(2)}" r="${r.toFixed(2)}"/>`;
    }
    layers+=`<g fill="${colors[li]}">${circles}</g>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs><clipPath id="c0"><rect width="${W}" height="${H}"/></clipPath></defs><rect width="${W}" height="${H}" fill="white"/><g clip-path="url(#c0)" style="mix-blend-mode:multiply">${layers}</g></svg>`;
}

// ═══════════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════════
function dlFile(content,name,type){
  const b=new Blob([content],{type});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);
}
function showSpinner(v){document.getElementById('spinner').classList.toggle('on',v);}

function exportPNG(){
  if(!state.imageLoaded) return;
  canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='halftoner.png';a.click();URL.revokeObjectURL(a.href);},'image/png');
}
function exportSVG(){
  if(!state.imageLoaded) return;
  showSpinner(true);
  setTimeout(()=>{
    try{
      const d=getImgData(),p=state.params[state.effect],W=canvas.width,H=canvas.height;
      let svg='';
      if(state.effect==='dots')        svg=svgDots(d.data,W,H,p);
      else if(state.effect==='cmyk')   svg=svgCMYK(d.data,W,H,p)[0].svg;
      else if(state.effect==='linear') svg=svgLinear(d.data,W,H,p);
      else if(state.effect==='shapes') svg=svgShapes(d.data,W,H,p);
      else if(state.effect==='riso')   svg=svgRiso(d.data,W,H,p);
      dlFile(svg,'halftoner.svg','image/svg+xml');
    }finally{showSpinner(false);}
  },10);
}
function exportCMYK(){
  if(!state.imageLoaded) return;
  showSpinner(true);
  setTimeout(()=>{
    try{
      const d=getImgData(),p=state.params.cmyk,W=canvas.width,H=canvas.height;
      svgCMYK(d.data,W,H,p).forEach((l,i)=>{
        setTimeout(()=>dlFile(l.svg,`halftoner_${l.name}.svg`,'image/svg+xml'),i*200);
      });
    }finally{showSpinner(false);}
  },10);
}

// ═══════════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════════
function handleFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const img=new Image();img.onload=()=>loadImage(img);img.src=URL.createObjectURL(file);
}
document.getElementById('uploadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('dropClick').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>handleFile(e.target.files[0]));

const ca=document.getElementById('canvas-area');
ca.addEventListener('dragover',e=>{e.preventDefault();ca.classList.add('drag-over');});
ca.addEventListener('dragleave',()=>ca.classList.remove('drag-over'));
ca.addEventListener('drop',e=>{e.preventDefault();ca.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});

// Effect tabs
document.querySelectorAll('.eff-tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.eff-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    state.effect=t.dataset.eff;
    buildControls(state.effect);render();
  });
});

// Split
const splitLine=document.getElementById('split-line');
document.getElementById('splitBtn').addEventListener('click',()=>{
  state.splitActive=!state.splitActive;
  document.getElementById('splitBtn').classList.toggle('active',state.splitActive);
  splitLine.style.display=state.splitActive?'block':'none';
  if(!state.splitActive){state.splitX=-1;render();}
});
canvas.addEventListener('mousemove',e=>{
  if(!state.splitActive||!state.imageLoaded) return;
  const rect=canvas.getBoundingClientRect();
  state.splitX=(e.clientX-rect.left)*(canvas.width/rect.width);
  const caRect=ca.getBoundingClientRect();
  splitLine.style.left=(e.clientX-caRect.left)+'px';
  render();
});

// Export menu
document.getElementById('expBtn').addEventListener('click',e=>{
  e.stopPropagation();document.getElementById('expMenu').classList.toggle('open');
});
document.addEventListener('click',()=>document.getElementById('expMenu').classList.remove('open'));
document.querySelectorAll('.exp-item').forEach(item=>{
  item.addEventListener('click',e=>{
    e.stopPropagation();document.getElementById('expMenu').classList.remove('open');
    const act=item.dataset.act;
    if(act==='png') exportPNG();
    else if(act==='svg') exportSVG();
    else if(act==='cmyk') exportCMYK();
  });
});

// Language switcher
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentLang=btn.dataset.lang;
    applyLang();
  });
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
canvas.width=800;canvas.height=600;
applyLang(); // Apply default lang (eu) on load
</script>
</body>
</html>
